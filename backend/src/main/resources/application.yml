spring:
  application:
    name: ai-examination-system
  profiles:
    active: local
  datasource:
    url: ${AES_DB_URL:jdbc:mysql://localhost:3306/aes?useUnicode=true&characterEncoding=utf8mb4&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Shanghai}
    username: ${AES_DB_USERNAME:aes}
    password: ${AES_DB_PASSWORD:aes_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${AES_FLYWAY_ENABLED:true}
    locations: classpath:db/migration,filesystem:../database/migration
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

aes:
  school-name: ${AES_SCHOOL_NAME:Local School}
  upload-dir: ${AES_UPLOAD_DIR:./data/uploads}
  auth:
    token-ttl-hours: ${AES_AUTH_TOKEN_TTL_HOURS:8}
    initial-admin:
      username: ${AES_INITIAL_ADMIN_USERNAME:admin}
      password: ${AES_INITIAL_ADMIN_PASSWORD:Admin@123456}
      real-name: ${AES_INITIAL_ADMIN_REAL_NAME:系统管理员}
    dev-seed:
      enabled: ${AES_DEV_SEED_ENABLED:false}
  cors:
    allowed-origins:
      - ${AES_CORS_ALLOWED_ORIGIN:http://localhost:5173}
      - http://127.0.0.1:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - X-Request-ID
    allow-credentials: true
    max-age: 3600
  ai:
    deepseek-api-key: ${DEEPSEEK_API_KEY:}
    deepseek-base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    mock-enabled: ${AES_AI_MOCK_ENABLED:true}
    fallback-to-rule-parser: ${AES_AI_FALLBACK_TO_RULE_PARSER:true}
    model: ${AES_AI_MODEL:deepseek-chat}
  grading:
    auto-grade-fill-blank: ${AES_GRADING_AUTO_GRADE_FILL_BLANK:false}
